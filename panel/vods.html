<!doctype html>
<html lang="en" data-i18n-title="vods.pageTitle">
  <head>
    <meta charset="utf-8" />
    <title>Planning VODs - Twitch Favorites Sidebar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../styles/vods.css" />
  </head>
  <body>
    <main class="tfr-vods-shell">
      <header class="tfr-vods-header">
        <div>
          <p class="tfr-vods-kicker">Twitch Favorites Sidebar</p>
          <h1 data-i18n="vods.title">VOD Schedule</h1>
        </div>
        <div class="tfr-vods-header__actions">
          <button class="tfr-vods-button tfr-vods-button--ghost" id="refreshButton" type="button" data-i18n="vods.refresh">Refresh VODs</button>
        </div>
      </header>

      <section class="tfr-vods-toolbar" aria-label="Schedule filters" data-i18n-aria-label="vods.filters">
        <label class="tfr-vods-field tfr-vods-field--search">
          <span data-i18n="vods.searchLabel">Search</span>
          <input id="searchInput" type="search" placeholder="Streamer or VOD title" data-i18n-placeholder="vods.search" />
        </label>
        <label class="tfr-vods-field">
          <span data-i18n="vods.group">Group</span>
          <select id="groupSelect"></select>
        </label>
        <label class="tfr-vods-field">
          <span data-i18n="vods.sort">Sort by</span>
          <div class="tfr-vods-sort-control">
            <select id="sortSelect">
              <option value="time" data-i18n="vods.sort.time">VOD time</option>
              <option value="name" data-i18n="vods.sort.name">Streamer name</option>
              <option value="views" data-i18n="vods.sort.views">View count</option>
              <option value="duration" data-i18n="vods.sort.duration">VOD duration</option>
              <option value="videos" data-i18n="vods.sort.videos">VOD count</option>
            </select>
            <button id="sortDirectionButton" class="tfr-vods-icon-button" type="button" aria-label="Inverser le tri" title="Inverser le tri">&darr;</button>
          </div>
        </label>
        <label class="tfr-vods-field">
          <span>Jour</span>
          <div class="tfr-vods-day-control">
            <button id="previousDayButton" class="tfr-vods-icon-button" type="button" aria-label="Jour precedent" title="Jour precedent">&lsaquo;</button>
            <input id="dayInput" type="date" />
            <button id="nextDayButton" class="tfr-vods-icon-button" type="button" aria-label="Jour suivant" title="Jour suivant">&rsaquo;</button>
          </div>
          <small id="dayHint"></small>
        </label>
      </section>

      <section class="tfr-vods-summary" id="summary" aria-live="polite"></section>

      <section class="tfr-vods-board" aria-label="Planning des VODs">
        <div class="tfr-vods-timeline" id="timeline"></div>
      </section>

      <section class="tfr-vods-inspector" id="vodInspector" aria-label="Analyse de la VOD" hidden></section>

      <section class="tfr-vods-empty" id="emptyState" hidden>
        <h2 data-i18n="vods.empty">No VODs to display</h2>
        <p data-i18n="vods.emptyHint">Try another day or group, or refresh Twitch data.</p>
      </section>
    </main>

    <script src="../src/contentScripts/extensionI18n.js"></script>
    <script src="./vods.js"></script>
  </body>
</html>
